# Default stack: local development with bind-mounted source and Next.js dev server.
#
# Hot reload: `NEXT_DEV_USE_WEBPACK` + `WATCHPACK_POLLING` — Next16 defaults to Turbopack,
# which often misses file changes on Docker bind mounts (especially from Windows hosts).
# Webpack dev + polling matches host files reliably.
#
# Prisma: edits under `prisma/*.prisma` trigger `prisma generate` and a Next restart (not migrations).
# New migrations: `docker compose exec web npx prisma migrate dev` (or `npm run db:migrate`).
# The `migrate` service only runs `migrate deploy` once when the stack starts.
#
# `.env*` changes restart Next inside the container (no full Docker restart).
# Put secrets in project `.env` (mounted at /app/.env). Avoid duplicating them in
# `environment:` — those are fixed until the container is recreated.
#
# Production: docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: calendly_clone
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d calendly_clone"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/calendly_clone
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    command: npx prisma migrate deploy
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    init: true
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      # DB inside the compose network (override in `.env` only if you know you need to)
      DATABASE_URL: postgresql://postgres:postgres@db:5432/calendly_clone
      # Webpack dev + polling (Turbopack ignores WATCHPACK_POLLING — see compose header)
      NEXT_DEV_USE_WEBPACK: "true"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  node_modules:
  next_cache:
